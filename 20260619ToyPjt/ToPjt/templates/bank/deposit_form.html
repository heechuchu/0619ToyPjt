<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
   
    <title>입금</title>
    <link href="{{ url_for('static',filename='css/common.css')}}" rel="stylesheet">
    <link href="{{ url_for('static',filename='css/member.css')}}" rel="stylesheet">
    <script src="{{ url_for('static',filename='js/member.js')}}"></script>
  
</head>
<body>
    <h2>입금</h2>
    <article id="diposit_wrap">
        <div class="diposit_form">
            <form action="/bank/diposit_confirm" method="post">
                
                <select name="accountNo">
                    {% for account in accounts %}
                    <option value="{{ account.accountNo }}">
                        {{ account.accountNo }} / 잔액 : {{ account.balance }}원
                    </option>
                    {% endfor %}
                </select>

                <input type="text" name="amount" placeholder="입금 금액">
                <input type="submit" value="입금">
               
            </form>
            </div>
    </article>
    {% include 'include/footer.html' %}
</body>
</html>
